name: AI News Digest

on:
  schedule:
    # 15:30 UTC = 21:00 IST (UTC+5:30)
    - cron: "30 15 * * *"
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      # Cache seen_hashes.json so duplicates are remembered across runs
      - name: Restore seen-hashes cache
        uses: actions/cache@v5
        with:
          path: seen_hashes.json
          key: seen-hashes-${{ runner.os }}
          restore-keys: seen-hashes-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_news.py

      # Save updated seen_hashes.json back to cache
      - name: Save seen-hashes cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: seen_hashes.json
          key: seen-hashes-${{ runner.os }}-${{ github.run_id }}
