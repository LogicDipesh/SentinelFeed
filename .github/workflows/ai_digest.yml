name: AI News Digest

on:
  schedule:
    # 15:30 UTC = 21:00 IST (UTC+5:30)
    - cron: "30 15 * * *"
  workflow_dispatch:   # lets you trigger it manually from GitHub UI to test

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Cache seen_hashes.json so duplicates are remembered across runs
      - name: Restore seen-hashes cache
        uses: actions/cache@v4
        with:
          path: seen_hashes.json
          key: seen-hashes-${{ runner.os }}
          restore-keys: seen-hashes-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          NEWS_API_KEY:     ${{ secrets.NEWS_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_news.py

      # Save updated seen_hashes.json back to cache
      - name: Save seen-hashes cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen_hashes.json
          key: seen-hashes-${{ runner.os }}-${{ github.run_id }}
